<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bochel Microcrédito</title>
    <meta name="description" content="Bochel Microcrédito - Soluções Financeiras" />
    <meta name="author" content="Bochel Microcrédito" />

    <meta property="og:title" content="Bochel Microcrédito" />
    <meta property="og:description" content="Bochel Microcrédito - Soluções Financeiras para Moçambique" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo-bochel.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@bochelmicrocredito" />
    <meta name="twitter:image" content="/logo-bochel.png" />
    
    <!-- PWA Configuration – manifest dinâmico por perfil via JS -->
    <link id="pwa-manifest" rel="manifest" href="/manifest.json" />
    <meta id="pwa-theme-color" name="theme-color" content="#0b3a20" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta id="pwa-apple-title" name="apple-mobile-web-app-title" content="Bochel" />
    <link rel="apple-touch-icon" href="/icon%20favcon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon%20favcon.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon%20favcon.png" />
    <link rel="icon" href="/icon%20favcon.png" type="image/png" />
    <script>
      // Detectar perfil armazenado e carregar manifest correcto antes do React
      (function() {
        try {
          var stored = localStorage.getItem('user');
          if (stored) {
            var u = JSON.parse(stored);
            var role = u.role;
            var manifests = { gestor: '/manifest-gestor.json', agente: '/manifest-agente.json', cliente: '/manifest-cliente.json' };
            var themes = { gestor: '#0b3a20', agente: '#1b4d3e', cliente: '#d37c22' };
            var titles = { gestor: 'Bochel Gestor', agente: 'Bochel Agente', cliente: 'Bochel Cliente' };
            if (manifests[role]) {
              document.getElementById('pwa-manifest').setAttribute('href', manifests[role]);
              document.getElementById('pwa-theme-color').setAttribute('content', themes[role]);
              document.getElementById('pwa-apple-title').setAttribute('content', titles[role]);
              document.title = titles[role];
            }
          }
        } catch(e) {}
      })();
    </script>
    <!-- Fix: Override navigator.locks para browsers onde causa timeout (Edge) -->
    <script>
      (function() {
        if (typeof navigator !== 'undefined' && navigator.locks && navigator.locks.request) {
          var original = navigator.locks.request.bind(navigator.locks);
          navigator.locks.request = function(name, optionsOrCallback, maybeCallback) {
            var callback = maybeCallback || optionsOrCallback;
            if (typeof callback === 'function') {
              return Promise.resolve(callback({ name: name, mode: 'exclusive' }));
            }
            return original(name, optionsOrCallback, maybeCallback);
          };
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
            .then(reg => {
              reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                if (installingWorker) {
                  installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      // New update available, force it to activate
                      console.log('New update available! Forcing reload...');
                    }
                  };
                }
              };
            });

          // Automatically reload the page when a new service worker takes over
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!refreshing) {
              refreshing = true;
              window.location.reload();
            }
          });
        });
      }
    </script>
  </body>
</html>
